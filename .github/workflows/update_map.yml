name: Update PyTorch Version Mapping

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    # 必须显式声明，否则默认是只读
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 确保拉取的是最新的分支
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python Script
        run: python update_mapping.py

      - name: Commit and Push Changes
        run: |
          # 使用 GitHub 官方机器人账号，更稳定
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add pytorch_mapping.json
          
          # 只有在有变动时才提交，防止 Action 报错
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update pytorch mapping"
            # 如果 push 403，尝试显式指定远端
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit."
          fi

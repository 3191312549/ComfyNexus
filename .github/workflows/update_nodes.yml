name: Update ComfyUI Nodes List

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 00:00 (北京时间早上8点) 自动运行
  workflow_dispatch: # 允许你在 GitHub 网页端 Actions 标签页手动点击运行

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python Script
        run: python fetch_nodes.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          echo "==== 检查当前目录文件 ===="
          ls -R
          
          echo "==== 检查 Git 状态 ===="
          git status
          
          # 使用 -f 强制 add，并观察报错
          git add comfyui_api_nodes.json || echo "无法添加文件，可能文件根本不存在"
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ComfyUI nodes list" && git push)

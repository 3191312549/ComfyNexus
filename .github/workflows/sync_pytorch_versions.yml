name: Sync PyTorch Version Mapping

on:
  schedule:
    # 每周日凌晨 00:00 (UTC) 运行一次
    - cron: '0 0 * * 0'
  # 允许在 Actions 页面手动点击按钮触发
  workflow_dispatch:

jobs:
  update-mapping:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 推送代码到仓库

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate mapping JSON
        run: python update_mapping.py

      - name: Check for changes and Commit
        run: |
          # 检查文件是否有修改
          if [[ -n $(git status -s pytorch_mapping.json) ]]; then
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            git add pytorch_mapping.json
            git commit -m "chore: auto-update PyTorch version mapping"
            git push
            echo "Successfully updated and pushed new mapping."
          else
            echo "No changes in version mapping detected."
          fi

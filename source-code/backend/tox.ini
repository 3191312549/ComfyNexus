# Tox 配置文件
# 用于管理独立的测试环境

[tox]
envlist = py312
skipsdist = True

[testenv]
# 测试环境依赖
deps =
    -r requirements.txt
    -r requirements-test.txt

# 测试命令
commands =
    pytest {posargs:tests/}

# 环境变量
setenv =
    PYTHONPATH = {toxinidir}

[testenv:coverage]
# 覆盖率测试环境
commands =
    pytest --cov=src --cov-report=html --cov-report=term {posargs:tests/}

[testenv:unit]
# 仅运行单元测试
commands =
    pytest {posargs:tests/unit/}

[testenv:integration]
# 仅运行集成测试
commands =
    pytest {posargs:tests/integration/}

[testenv:properties]
# 仅运行属性测试
commands =
    pytest {posargs:tests/properties/}
